<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ViralForge AI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

.logo{
    text-align:center;
    font-size:45px;
    color:#00ffee;
    font-weight:bold;
    margin-top:20px;
    text-shadow:0 0 20px #00ffee;
}

.card{
    background:#111;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 0 20px #00ffee55;
}

input, textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    background:#1a1a1a;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:15px;
    background:#00ffee;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    box-shadow:0 0 20px #00ffee;
}

.result{
    margin-top:20px;
    background:#111;
    padding:20px;
    border-radius:20px;
    white-space:pre-wrap;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
🚀 ViralForge AI
</div>

<div class="card">

<h2>Generate Viral Video Idea</h2>

<input type="text" id="topic" placeholder="Enter topic">

<button onclick="generateIdea()">
Generate
</button>

<div class="result" id="result">
Your viral idea will appear here...
</div>

</div>

</div>

<script>

function generateIdea(){

let topic = document.getElementById("topic").value;

let result = `
🔥 Viral Title:
"${topic} secrets nobody tells you!"

🎬 Hook:
"Wait till the end..."

📈 Viral Caption:
This will blow your mind 😱

🏷 Hashtags:
#viral #trending #fyp #shorts
`;

document.getElementById("result").innerText = result;

}

</script>

</body>
</html>
