<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ViralForge AI</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#050505;
    color:white;
}

.container{
    max-width:550px;
    margin:auto;
    padding:25px;
    text-align:center;
}

.logo{
    font-size:48px;
    color:#00ffff;
    text-shadow:0 0 20px #00ffff;
    font-weight:bold;
}

.subtitle{
    color:#999;
    margin-top:10px;
    margin-bottom:35px;
}

.card{
    background:#101010;
    padding:25px;
    border-radius:22px;
    box-shadow:0 0 25px rgba(0,255,255,0.15);
}

select,
input{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:14px;
    background:#1b1b1b;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    margin-top:20px;
    border:none;
    border-radius:14px;
    background:#00ffff;
    color:black;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.result{
    margin-top:30px;
    background:#111;
    padding:22px;
    border-radius:18px;
    text-align:left;
    line-height:1.8;
    display:none;
}

.result h2{
    color:#00ffff;
}

.copyBtn{
    background:#222;
    color:#00ffff;
    margin-top:20px;
}

.footer{
    margin-top:35px;
    color:#666;
}

</style>
</head>

<body>

<div class="container">

<div class="logo">
🔥 ViralForge AI
</div>

<p class="subtitle">
Create Viral YouTube Shorts Ideas Instantly
</p>

<div class="card">

<select id="category">

<option>Horror</option>
<option>Gaming</option>
<option>Motivation</option>
<option>Facts</option>
<option>Business</option>
<option>Story</option>
<option>AI</option>

</select>

<input
type="text"
id="topic"
placeholder="Enter your topic..."
>

<button onclick="generateIdeas()">
Generate Viral Content
</button>

<div class="result" id="result">

<h2>🔥 Viral Title</h2>
<p id="title"></p>

<h2>🎯 Thumbnail Text</h2>
<p id="thumb"></p>

<h2>⚡ Hook</h2>
<p id="hook"></p>

<h2>🎬 Shorts Idea</h2>
<p id="idea"></p>

<button
class="copyBtn"
onclick="copyContent()">
📋 Copy Content
</button>

</div>

</div>

<p class="footer">
Made with ❤️ by ViralForge AI
</p>

</div>

<script>

function generateIdeas(){

    const topic =
    document.getElementById("topic").value;

    const category =
    document.getElementById("category").value;

    if(topic === ""){

        alert("Enter a topic");

        return;
    }

    const titles = [

        `${topic} Secrets Nobody Knows 😱`,

        `The Dark Truth About ${topic}`,

        `${topic} Facts That Sound Fake 🤯`,

        `Why Everyone Is Talking About ${topic}`,

        `This ${topic} Story Will Shock You 🔥`

    ];

    const thumbs = [

        `THIS CHANGED EVERYTHING`,

        `DON'T IGNORE THIS`,

        `SECRET EXPOSED`,

        `VIRAL NOW`,

        `UNBELIEVABLE 😳`

    ];

    const hooks = [

        `99% people don't know this about ${topic}`,

        `Wait till the end 😳`,

        `This changed everything...`,

        `You won't believe this 🤯`

    ];

    const ideas = [

        `Create a fast-paced ${category} video about ${topic} using suspense and emotional music.`,

        `Make a short reel explaining shocking facts about ${topic}.`,

        `Create a storytelling style short around ${topic}.`

    ];

    const randomTitle =
    titles[Math.floor(Math.random()*titles.length)];

    const randomThumb =
    thumbs[Math.floor(Math.random()*thumbs.length)];

    const randomHook =
    hooks[Math.floor(Math.random()*hooks.length)];

    const randomIdea =
    ideas[Math.floor(Math.random()*ideas.length)];

    document.getElementById("result").style.display =
    "block";

    document.getElementById("title").innerText =
    randomTitle;

    document.getElementById("thumb").innerText =
    randomThumb;

    document.getElementById("hook").innerText =
    randomHook;

    document.getElementById("idea").innerText =
    randomIdea;

}

function copyContent(){

    const text =

    document.getElementById("title").innerText
    + "\n\n" +

    document.getElementById("thumb").innerText
    + "\n\n" +

    document.getElementById("hook").innerText
    + "\n\n" +

    document.getElementById("idea").innerText;

    navigator.clipboard.writeText(text);

    alert("Copied!");

}

</script>

</body>
</html>
