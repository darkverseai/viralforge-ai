<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ViralForge AI</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#050505;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    padding:25px;
    text-align:center;
}

h1{
    color:#00ffff;
    font-size:48px;
    text-shadow:0 0 20px #00ffff;
}

.subtitle{
    color:#aaa;
    margin-bottom:40px;
    font-size:20px;
}

.box{
    background:#0b0b0b;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,255,255,0.3);
}

input, select{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#1b1b1b;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    margin-top:20px;
    border:none;
    border-radius:14px;
    background:#00ffff;
    color:black;
    font-size:24px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.result-box{
    margin-top:30px;
    background:#0f0f0f;
    padding:25px;
    border-radius:18px;
    text-align:left;
    line-height:1.8;
    box-shadow:0 0 20px rgba(0,255,255,0.2);
}

.result-box h2{
    color:#00ffff;
}

.footer{
    margin-top:35px;
    color:#777;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 ViralForge AI</h1>

<p class="subtitle">
AI Tool for Viral YouTube Shorts, Reels & Titles
</p>

<div class="box">

<select id="category">
    <option>Horror</option>
    <option>Motivation</option>
    <option>Gaming</option>
    <option>Facts</option>
    <option>AI</option>
    <option>Story</option>
</select>

<input type="text" id="topic" placeholder="Enter your topic...">

<button onclick="generateContent()">
Generate Viral Content
</button>

<div id="result"></div>

</div>

<p class="footer">
Made with ❤️ by ViralForge AI
</p>

</div>

<script>

function generateContent(){

    const topic =
        document.getElementById("topic").value;

    const category =
        document.getElementById("category").value;

    if(topic === ""){
        alert("Enter a topic first");
        return;
    }

    const titles = [
        `${topic} secrets nobody tells you!`,
        `This ${topic} trick went viral overnight`,
        `Why everyone is talking about ${topic}`,
        `${topic} facts that sound fake`,
        `The dark truth about ${topic}`,
        `${topic} story will shock you`
    ];

    const hooks = [
        `99% people don't know this about ${topic}`,
        `You will never see ${topic} the same again`,
        `This changed everything about ${topic}`,
        `This video can blow your mind`,
        `The internet is obsessed with ${topic}`
    ];

    const thumbs = [
        "THIS CHANGED EVERYTHING",
        "NOBODY KNEW THIS",
        "VIRAL SECRET EXPOSED",
        "THIS IS INSANE",
        "DON'T IGNORE THIS"
    ];

    const scripts = [
        `Today I will show you something crazy about ${topic}.`,
        `This is the hidden truth behind ${topic}.`,
        `People are shocked after discovering this about ${topic}.`
    ];

    const randomTitle =
        titles[Math.floor(Math.random()*titles.length)];

    const randomHook =
        hooks[Math.floor(Math.random()*hooks.length)];

    const randomThumb =
        thumbs[Math.floor(Math.random()*thumbs.length)];

    const randomScript =
        scripts[Math.floor(Math.random()*scripts.length)];

    document.getElementById("result").innerHTML = `

    <div class="result-box">

        <h2>🔥 Viral Title</h2>
        <p>${randomTitle}</p>

        <h2>🎯 Thumbnail Text</h2>
        <p>${randomThumb}</p>

        <h2>⚡ Hook</h2>
        <p>${randomHook}</p>

        <h2>🎬 Shorts Idea</h2>
        <p>
        Create a fast paced ${category} short about
        ${topic} using suspense, captions and quick cuts.
        </p>

        <h2>📝 Script</h2>
        <p>${randomScript}</p>

    </div>

    `;
}

</script>

</body>
</html>
