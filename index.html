<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ViralForge AI</title>

<style>

body{
    margin:0;
    padding:0;
    font-family:Arial;
    background:#050505;
    color:white;
}

.container{
    max-width:550px;
    margin:auto;
    padding:25px;
    text-align:center;
}

h1{
    color:#00ffff;
    font-size:48px;
    text-shadow:0 0 20px #00ffff;
}

.subtitle{
    color:#aaa;
    margin-bottom:35px;
    font-size:18px;
}

.box{
    background:#0b0b0b;
    padding:25px;
    border-radius:22px;
    box-shadow:0 0 25px rgba(0,255,255,0.25);
}

input, select{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:14px;
    background:#1b1b1b;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    margin-top:20px;
    border:none;
    border-radius:14px;
    background:#00ffff;
    color:black;
    font-size:22px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.result-box{
    margin-top:30px;
    background:#0f0f0f;
    padding:22px;
    border-radius:18px;
    text-align:left;
    line-height:1.8;
    box-shadow:0 0 20px rgba(0,255,255,0.15);
    white-space:pre-wrap;
}

.loading{
    margin-top:25px;
    color:#00ffff;
    font-size:18px;
}

.footer{
    margin-top:35px;
    color:#777;
}

.copy-btn{
    margin-top:20px;
    background:#222;
    color:#00ffff;
    font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 ViralForge AI</h1>

<p class="subtitle">
AI Tool for Viral YouTube Shorts, Reels & Titles
</p>

<div class="box">

<select id="category">
    <option>Horror</option>
    <option>Motivation</option>
    <option>Gaming</option>
    <option>Facts</option>
    <option>AI</option>
    <option>Story</option>
    <option>Business</option>
</select>

<input
type="text"
id="topic"
placeholder="Enter your topic..."
>

<button onclick="generateContent()">
Generate Viral Content
</button>

<div id="loading" class="loading"></div>

<div id="result"></div>

</div>

<p class="footer">
Powered by ViralForge AI 🚀
</p>

</div>

<script>

async function generateContent(){

    const topic =
        document.getElementById("topic").value;

    const category =
        document.getElementById("category").value;

    const result =
        document.getElementById("result");

    const loading =
        document.getElementById("loading");

    if(topic === ""){

        alert("Enter a topic first");

        return;
    }

    loading.innerHTML =
    "⚡ ViralForge AI is generating...";

    result.innerHTML = "";

    try{

        const response =
        await fetch("/api/chat",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({

                message:
`
Generate:
1 viral YouTube title
1 thumbnail text
1 hook
1 shorts idea
1 short script

Category:
${category}

Topic:
${topic}
`

            })

        });

        const data =
        await response.json();

        loading.innerHTML = "";

        result.innerHTML = `

        <div class="result-box">

${data.reply}

<button
class="copy-btn"
onclick="copyResult()">
📋 Copy
</button>

</div>

        `;

    }catch(error){

        loading.innerHTML = "";

        result.innerHTML =

        `<div class="result-box">
        Server Error ❌
        </div>`;

    }

}

function copyResult(){

    const text =
    document.querySelector(
    ".result-box"
    ).innerText;

    navigator.clipboard.writeText(text);

    alert("Copied!");

}

</script>

</body>
</html>
