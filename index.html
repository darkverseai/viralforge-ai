<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ViralForge AI</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#050505;
    color:white;
}

.container{
    max-width:500px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#00fff7;
    text-shadow:0 0 20px #00fff7;
}

.card{
    background:#111;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
    box-shadow:0 0 20px rgba(0,255,247,0.3);
}

input, textarea{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#1b1b1b;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#00fff7;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.output{
    margin-top:20px;
    background:#0d0d0d;
    padding:15px;
    border-radius:15px;
    line-height:1.7;
    white-space:pre-wrap;
}

.small{
    opacity:0.7;
    font-size:14px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 ViralForge AI</h1>

<div class="card">
<h2>🔥 Viral Content Generator</h2>

<input type="text" id="topic" placeholder="Enter topic...">

<button onclick="generate()">Generate Viral Ideas</button>

<div class="output" id="result">
Your viral content will appear here...
</div>

<div class="small">
Generate titles, hooks, thumbnail text and scripts instantly.
</div>
</div>

</div>

<script>

function generate(){

let topic = document.getElementById("topic").value;

if(topic==""){
    alert("Enter a topic");
    return;
}

let result = `
🔥 Viral Title:
"${topic} secrets nobody tells you!"

🎯 Thumbnail Text:
"THIS CHANGED EVERYTHING"

⚡ Hook:
"99% people don't know this about ${topic}..."

🎬 Shorts Idea:
Make a fast-paced reel showing amazing facts about ${topic}.

📝 Script:
"Today I'm going to show you something crazy about ${topic}. 
Watch till the end because this can completely change your thinking!"
`;

document.getElementById("result").innerText = result;

}

</script>

</body>
</html>
