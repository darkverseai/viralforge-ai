<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ViralForge AI</title>

<style>
body{
    margin:0;
    padding:0;
    background:#050505;
    font-family:Arial;
    color:white;
}

.container{
    width:90%;
    max-width:500px;
    margin:auto;
    padding-top:40px;
}

h1{
    text-align:center;
    font-size:38px;
    color:#00fff7;
    text-shadow:0 0 20px #00fff7;
}

.subtitle{
    text-align:center;
    color:#aaa;
    margin-bottom:30px;
}

.card{
    background:#111;
    padding:20px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,255,247,0.2);
}

input, select{
    width:100%;
    padding:16px;
    margin-top:15px;
    border:none;
    border-radius:12px;
    background:#1b1b1b;
    color:white;
    font-size:16px;
}

button{
    width:100%;
    padding:16px;
    margin-top:20px;
    border:none;
    border-radius:14px;
    background:#00fff7;
    color:black;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
}

.result{
    margin-top:25px;
    background:#0c0c0c;
    padding:20px;
    border-radius:15px;
    line-height:1.8;
    display:none;
}

.copyBtn{
    background:#222;
    color:#00fff7;
    margin-top:10px;
    font-size:15px;
}

.loading{
    text-align:center;
    margin-top:20px;
    display:none;
    color:#00fff7;
    font-size:18px;
}

.footer{
    text-align:center;
    margin-top:30px;
    color:#666;
    font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<h1>🔥 ViralForge AI</h1>

<p class="subtitle">
AI Tool for Viral YouTube Shorts, Reels & Titles
</p>

<div class="card">

<select id="type">
<option>Horror</option>
<option>Motivation</option>
<option>Facts</option>
<option>Gaming</option>
<option>Love</option>
<option>Business</option>
<option>Fitness</option>
</select>

<input type="text" id="topic" placeholder="Enter your topic..." />

<button onclick="generateIdea()">
Generate Viral Content
</button>

<div class="loading" id="loading">
⚡ Generating Viral Ideas...
</div>

<div class="result" id="result">

<h2>🔥 Viral Title</h2>
<p id="title"></p>

<h2>🎯 Thumbnail Text</h2>
<p id="thumb"></p>

<h2>⚡ Hook</h2>
<p id="hook"></p>

<h2>🎬 Shorts Idea</h2>
<p id="idea"></p>

<h2>📝 Script</h2>
<p id="script"></p>

<button class="copyBtn" onclick="copyContent()">
📋 Copy Content
</button>

</div>

</div>

<div class="footer">
Made with ❤️ by ViralForge AI
</div>

</div>

<script>

function generateIdea(){

let topic = document.getElementById("topic").value;
let type = document.getElementById("type").value;

if(topic === ""){
alert("Please enter a topic");
return;
}

document.getElementById("loading").style.display = "block";
document.getElementById("result").style.display = "none";

setTimeout(()=>{

document.getElementById("loading").style.display = "none";
document.getElementById("result").style.display = "block";

document.getElementById("title").innerText =
`${topic} Secrets Nobody Talks About!`;

document.getElementById("thumb").innerText =
`THIS CHANGED EVERYTHING`;

document.getElementById("hook").innerText =
`99% people don't know this about ${topic}...`;

document.getElementById("idea").innerText =
`Create a fast-paced ${type} reel with shocking visuals and emotional music about ${topic}.`;

document.getElementById("script").innerText =
`Today I will show you something CRAZY about ${topic}. This secret can completely change the way you think. Watch till the end because the final fact is unbelievable!`;

},2000);

}

function copyContent(){

let text =
document.getElementById("title").innerText + "\n\n" +
document.getElementById("thumb").innerText + "\n\n" +
document.getElementById("hook").innerText + "\n\n" +
document.getElementById("idea").innerText + "\n\n" +
document.getElementById("script").innerText;

navigator.clipboard.writeText(text);

alert("Copied Successfully!");

}

</script>

</body>
</html>
