<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ViralForge AI</title>

<style>

body{
    margin:0;
    padding:0;
    background:#050505;
    font-family:Arial;
    color:white;
}

.container{
    max-width:550px;
    margin:auto;
    padding:25px;
    text-align:center;
}

h1{
    color:#00ffff;
    font-size:48px;
    text-shadow:0 0 20px #00ffff;
}

.subtitle{
    color:#aaa;
    margin-bottom:35px;
    font-size:18px;
}

.box{
    background:#0b0b0b;
    padding:25px;
    border-radius:22px;
    box-shadow:0 0 25px rgba(0,255,255,0.2);
}

input, select{
    width:100%;
    padding:18px;
    margin-top:15px;
    border:none;
    border-radius:14px;
    background:#1b1b1b;
    color:white;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:18px;
    margin-top:20px;
    border:none;
    border-radius:14px;
    background:#00ffff;
    color:black;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.result-box{
    margin-top:30px;
    background:#111;
    padding:22px;
    border-radius:18px;
    text-align:left;
    line-height:1.8;
    white-space:pre-wrap;
}

.result-box h2{
    color:#00ffff;
}

.copy-btn{
    background:#222;
    color:#00ffff;
    margin-top:20px;
}

.footer{
    margin-top:35px;
    color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>🔥 ViralForge AI</h1>

<p class="subtitle">
Create Viral YouTube Shorts Ideas Instantly
</p>

<div class="box">

<select id="category">

<option>Horror</option>
<option>Gaming</option>
<option>Motivation</option>
<option>Facts</option>
<option>Story</option>
<option>Business</option>
<option>AI</option>

</select>

<input
type="text"
id="topic"
placeholder="Enter your topic..."
>

<button onclick="generateContent()">
Generate Viral Content
</button>

<div id="result"></div>

</div>

<p class="footer">
Made with ❤️ by ViralForge AI
</p>

</div>

<script>

function generateContent(){

    const topic =
    document.getElementById("topic").value;

    const category =
    document.getElementById("category").value;

    const result =
    document.getElementById("result");

    if(topic === ""){

        alert("Enter a topic");

        return;
    }

    const titles = [

        `${topic} Secrets Nobody Knows 😱`,

        `This ${topic} Story Will Shock You 🔥`,

        `${topic} Facts That Sound Fake 🤯`,

        `Why Everyone Is Talking About ${topic}`,

        `The Dark Truth About ${topic}`

    ];

    const hooks = [

        `99% people don't know this about ${topic}`,

        `Wait till the end 😳`,

        `This changed everything...`,

        `You won't believe this 🤯`

    ];

    const thumbs = [

        `THIS CHANGED EVERYTHING`,

        `DON'T IGNORE THIS`,

        `SECRET EXPOSED`,

        `VIRAL NOW`

    ];

    const randomTitle =
    titles[Math.floor(Math.random()*titles.length)];

    const randomHook =
    hooks[Math.floor(Math.random()*hooks.length)];

    const randomThumb =
    thumbs[Math.floor(Math.random()*thumbs.length)];

    result.innerHTML = `

    <div class="result-box">

    <h2>🔥 Viral Title</h2>
    <p>${randomTitle}</p>

    <h2>🎯 Thumbnail Text</h2>
    <p>${randomThumb}</p>

    <h2>⚡ Hook</h2>
    <p>${randomHook}</p>

    <h2>🎬 Shorts Idea</h2>

    <p>
    Create a fast-paced ${category}
    video about ${topic}
    using suspense, captions
    and emotional music.
    </p>

    <button
    class="copy-btn"
    onclick="copyContent()">
    📋 Copy
    </button>

    </div>

    `;
}

function copyContent(){

    const text =
    document.querySelector(".result-box").innerText;

    navigator.clipboard.writeText(text);

    alert("Copied!");

}

</script>

</body>
</html>
